<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }

    header {
      padding: 1rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f0f0f0;
    }

    header p {
      font-size: 12px;
      color: #888;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3ecfcf;
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px #3ecfcf88;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
    }

    .msg.user .bubble {
      background: #6c63ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.aria .bubble {
      background: #1e1e1e;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
      border: 0.5px solid #2a2a2a;
    }

    .msg .bubble .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 20px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #888;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 0.75rem 0 0.5rem;
      border-top: 0.5px solid #222;
    }

    #input {
      flex: 1;
      background: #1a1a1a;
      border: 0.5px solid #333;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      color: #f0f0f0;
      outline: none;
      resize: none;
      height: 44px;
      line-height: 1.4;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    #input:focus { border-color: #6c63ff; }
    #input::placeholder { color: #555; }

    #send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #6c63ff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send:hover { background: #7c74ff; }
    #send:active { transform: scale(0.95); }
    #send:disabled { background: #333; cursor: not-allowed; }

    #send svg { width: 18px; height: 18px; fill: #fff; }

    #user-id-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 0.5rem;
    }

    #user-id-row label { font-size: 12px; color: #666; }

    #user-id {
      background: #1a1a1a;
      border: 0.5px solid #2a2a2a;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: #aaa;
      outline: none;
      font-family: inherit;
      width: 130px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar">AR</div>
    <div>
      <h1>ARIA</h1>
      <p>Adaptive Responsive Intelligent Assistant</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="user-id-row">
    <label for="user-id">User ID:</label>
    <input id="user-id" type="text" value="me" maxlength="40" />
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea id="input" placeholder="Message ARIA..." rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API = "https://evolving-ai-assistant-production.up.railway.app/chat";
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const userIdEl = document.getElementById("user-id");

  function addMessage(role, content) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (content === "typing") {
      bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    } else {
      bubble.textContent = content;
    }
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function send() {
    const message = inputEl.value.trim();
    const userId = userIdEl.value.trim() || "anonymous";
    if (!message) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    addMessage("user", message);
    const typingEl = addMessage("aria", "typing");

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, userId }),
      });

      const data = await res.json();
      typingEl.remove();

      if (data.response) {
        addMessage("aria", data.response);
      } else {
        addMessage("aria", data.error || "Something went wrong.");
      }
    } catch (err) {
      typingEl.remove();
      addMessage("aria", "Couldn't reach ARIA. Check your connection.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", send);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  addMessage("aria", "Hey! I'm ARIA. What's on your mind?");
</script>
</body>
</html>
